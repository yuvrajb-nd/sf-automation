name: AI PR Review (Reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number
      head_branch:
        required: true
        type: string
      base_branch:
        required: true
        type: string
      head_sha:
        required: true
        type: string
      repo:
        required: true
        type: string
      pipeline_order:
        description: Comma-separated branch promotion order (e.g. TESTING,STAGING,main)
        required: false
        type: string
        default: 'TESTING,main'
    secrets:
      GH_BOT_TOKEN:
        required: true

jobs:
  detect-and-resolve:
    name: Conflict Detection and AI Resolution
    runs-on: ubuntu-latest
    outputs:
      conflicts_found: ${{ steps.detect.outputs.CONFLICTS_FOUND }}
    steps:
      - name: Checkout sf-automation (scripts)
        uses: actions/checkout@v4
        with:
          repository: yuvrajb-nd/sf-automation
          token: ${{ secrets.GH_BOT_TOKEN }}
          path: automation

      - name: Checkout feature repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.head_branch }}
          token: ${{ secrets.GH_BOT_TOKEN }}
          fetch-depth: 0
          path: repo

      - name: Detect conflicts
        id: detect
        working-directory: repo
        env:
          BASE_BRANCH: ${{ inputs.base_branch }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
        run: bash $GITHUB_WORKSPACE/automation/scripts/pr_automation/detect_conflicts.sh

      - name: Extract conflict hunks
        if: steps.detect.outputs.CONFLICTS_FOUND == '"true"'
        working-directory: repo
        env:
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: bash $GITHUB_WORKSPACE/automation/scripts/pr_automation/extract_hunks.sh

      - name: Resolve conflicts with AI
        id: resolve
        if: steps.detect.outputs.CONFLICTS_FOUND == '"true"'
        working-directory: repo
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          GH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
        run: bash $GITHUB_WORKSPACE/automation/scripts/pr_automation/resolve_conflicts.sh

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conflict-report
          path: /tmp/conflict_report.json
          if-no-files-found: ignore

  ocm-validation:
    name: OCM Validation and Package Audit
    runs-on: ubuntu-latest
    outputs:
      ocm_high: ${{ steps.ocm.outputs.OCM_HIGH }}
      missing_count: ${{ steps.audit.outputs.MISSING_COUNT }}
    steps:
      - name: Checkout sf-automation (scripts)
        uses: actions/checkout@v4
        with:
          repository: yuvrajb-nd/sf-automation
          token: ${{ secrets.GH_BOT_TOKEN }}
          path: automation

      - name: Checkout feature repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.head_branch }}
          token: ${{ secrets.GH_BOT_TOKEN }}
          fetch-depth: 0
          path: repo

      - name: Check branch promotion order
        id: branch-order
        working-directory: repo
        env:
          HEAD_BRANCH: ${{ inputs.head_branch }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          PIPELINE_ORDER: ${{ inputs.pipeline_order }}
        run: bash $GITHUB_WORKSPACE/automation/scripts/pr_automation/check_branch_order.sh

      - name: Categorise metadata changes
        id: ocm
        working-directory: repo
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.repo }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          GH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
        run: bash $GITHUB_WORKSPACE/automation/scripts/pr_automation/ocm_categorise.sh

      - name: Audit Package.xml
        id: audit
        working-directory: repo
        env:
          HEAD_BRANCH: ${{ inputs.head_branch }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          GH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          REPO_ROOT: ${{ github.workspace }}/repo
        run: bash $GITHUB_WORKSPACE/automation/scripts/pr_automation/audit_package_xml.sh

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ocm-report
          path: |
            /tmp/ocm_report.json
            /tmp/package_audit.json
            /tmp/branch_order.json
          if-no-files-found: ignore

  post-report:
    name: Post PR Comment
    runs-on: ubuntu-latest
    needs: [detect-and-resolve, ocm-validation]
    if: always()
    steps:
      - name: Checkout sf-automation (scripts only)
        uses: actions/checkout@v4
        with:
          repository: yuvrajb-nd/sf-automation
          token: ${{ secrets.GH_BOT_TOKEN }}
          path: automation

      - uses: actions/download-artifact@v4
        with:
          name: conflict-report
          path: /tmp
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: ocm-report
          path: /tmp
        continue-on-error: true

      - name: Post or update PR comment
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.repo }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          GH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
        run: bash $GITHUB_WORKSPACE/automation/scripts/pr_automation/post_pr_comment.sh
