name: AI PR Review & Conflict Resolution (Reusable)

# Lives in yuvrajb-nd/sf-automation.
# Each job uses a dual-checkout pattern:
#   path: automation  → sf-automation repo (scripts)
#   path: repo        → the calling feature repo (git operations target)

on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string
      head_branch:
        description: Source branch (the PR branch)
        required: true
        type: string
      base_branch:
        description: Target branch (TESTING or main)
        required: true
        type: string
      head_sha:
        description: Head commit SHA
        required: true
        type: string
      repo:
        description: Repository in owner/repo format
        required: true
        type: string
    secrets:
      GH_BOT_TOKEN:
        required: true

  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to process
        required: true
        type: string
      head_branch:
        description: Source branch
        required: true
        type: string
      base_branch:
        description: Target branch
        required: true
        type: string
      head_sha:
        description: Head commit SHA
        required: true
        type: string
      repo:
        description: owner/repo
        required: true
        type: string

jobs:
  # ── Job 1: Detect & Resolve Conflicts ──────────────────────────────────────
  detect-and-resolve:
    name: Conflict Detection & AI Resolution
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    outputs:
      conflicts_found: ${{ steps.detect.outputs.CONFLICTS_FOUND }}
      all_passed: ${{ steps.resolve.outputs.ALL_PASSED }}
      commit_sha: ${{ steps.resolve.outputs.COMMIT_SHA }}

    steps:
      - name: Checkout sf-automation (scripts)
        uses: actions/checkout@v4
        with:
          path: automation

      - name: Checkout feature repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.head_branch }}
          token: ${{ secrets.GH_BOT_TOKEN }}
          fetch-depth: 0
          path: repo

      - name: Detect conflicts
        id: detect
        working-directory: repo
        env:
          BASE_BRANCH: ${{ inputs.base_branch }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
        run: bash $GITHUB_WORKSPACE/automation/scripts/pr_automation/detect_conflicts.sh

      - name: Extract conflict hunks
        if: steps.detect.outputs.CONFLICTS_FOUND == 'true'
        working-directory: repo
        env:
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: bash $GITHUB_WORKSPACE/automation/scripts/pr_automation/extract_hunks.sh

      - name: Resolve conflicts with AI
        id: resolve
        if: steps.detect.outputs.CONFLICTS_FOUND == 'true'
        working-directory: repo
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          GH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
        run: bash $GITHUB_WORKSPACE/automation/scripts/pr_automation/resolve_conflicts.sh

      - name: Upload conflict report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conflict-report
          path: /tmp/conflict_report.json
          if-no-files-found: ignore

  # ── Job 2: OCM Validation ──────────────────────────────────────────────────
  ocm-validation:
    name: OCM Validation & Package Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    outputs:
      ocm_high: ${{ steps.ocm.outputs.OCM_HIGH }}
      ocm_med: ${{ steps.ocm.outputs.OCM_MED }}
      ocm_low: ${{ steps.ocm.outputs.OCM_LOW }}
      missing_count: ${{ steps.audit.outputs.MISSING_COUNT }}

    steps:
      - name: Checkout sf-automation (scripts)
        uses: actions/checkout@v4
        with:
          path: automation

      - name: Checkout feature repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.head_branch }}
          token: ${{ secrets.GH_BOT_TOKEN }}
          fetch-depth: 0
          path: repo

      - name: Categorise metadata changes
        id: ocm
        working-directory: repo
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.repo }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          GH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
        run: bash $GITHUB_WORKSPACE/automation/scripts/pr_automation/ocm_categorise.sh

      - name: Audit Package.xml
        id: audit
        working-directory: repo
        env:
          HEAD_BRANCH: ${{ inputs.head_branch }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          GH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
          REPO_ROOT: ${{ github.workspace }}/repo
        run: bash $GITHUB_WORKSPACE/automation/scripts/pr_automation/audit_package_xml.sh

      - name: Upload OCM report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ocm-report
          path: |
            /tmp/ocm_report.json
            /tmp/package_audit.json
          if-no-files-found: ignore

  # ── Job 3: Post Report ─────────────────────────────────────────────────────
  post-report:
    name: Post PR Comment
    runs-on: ubuntu-latest
    needs: [detect-and-resolve, ocm-validation]
    if: always()
    permissions:
      pull-requests: write

    steps:
      - name: Checkout sf-automation (scripts only)
        uses: actions/checkout@v4
        with:
          path: automation

      - name: Download conflict report
        uses: actions/download-artifact@v4
        with:
          name: conflict-report
          path: /tmp
        continue-on-error: true

      - name: Download OCM report
        uses: actions/download-artifact@v4
        with:
          name: ocm-report
          path: /tmp
        continue-on-error: true

      - name: Post or update PR comment
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ inputs.repo }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          GH_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
        run: |
          bash $GITHUB_WORKSPACE/automation/scripts/pr_automation/post_pr_comment.sh \
            "$PR_NUMBER" "$REPO" "$HEAD_BRANCH" "$BASE_BRANCH"
