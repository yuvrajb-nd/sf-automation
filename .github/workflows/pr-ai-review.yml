name: AI PR Review (Reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: number
      head_branch:
        required: true
        type: string
      base_branch:
        required: true
        type: string
      head_sha:
        required: true
        type: string
      repo:
        required: true
        type: string
    secrets:
      GH_BOT_TOKEN:
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Hello
        run: echo "PR ${{ inputs.pr_number }} on ${{ inputs.repo }}"
